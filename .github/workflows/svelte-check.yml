name: Svelte Check

on:
  push:
    paths:
      - '**.svelte'
      - '**.ts'
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: 'pnpm'

      - name: Prepare blank env file
        run: cp .env.example .env

      - name: Install dependencies
        run: pnpm ci

      - name: Add Svelte Check annotator
        uses: prgm-dev/svelte-check-pr-annotator@91bbcab7428265bde6223fd1fa824336af7ef488 # main

      - name: Run Svelte Check
        run: pnpm run check --output machine
